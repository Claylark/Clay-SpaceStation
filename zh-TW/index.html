    html {

    }

    /* 極致純黑的深色模式，提供最高對比度，強制白字 */
    html.dark body { background-color: #000000; color: #ffffff; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }

    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    html.dark ::-webkit-scrollbar-thumb { background: #333333; }
    html.dark ::-webkit-scrollbar-thumb:hover { background: #555555; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 全螢幕滾動 Snap 容器樣式 */
    .snap-section {
        scroll-snap-align: start;
        scroll-snap-stop: always;
    }

    .lf-card { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 1.5rem; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.03); transition: all 0.3s ease; }

    /* 深色模式下的卡片，黑灰質感 */
    html.dark .lf-card { background: #0a0a0a; border-color: #2a2a2a; box-shadow: 0 4px 15px 0 rgba(0,0,0,0.8); }
    html.dark .lf-card:hover { border-color: #444444; box-shadow: 0 10px 25px -3px rgba(0,0,0,0.9); }

    /* 藥丸專屬上浮動畫 */
    @keyframes slideUpPill {
        0% { opacity: 0; transform: translateY(25px); }
        100% { opacity: 1; transform: translateY(0); }
    }
    .animate-pill {
        opacity: 0;
        animation: slideUpPill 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .liquid-glass {

        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);

    }
    html.dark .liquid-glass {
        background: rgba(15, 15, 15, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.08);
    }

        const [isVisible, setVisible] = useState(false);
        const [isScrolling, setIsScrolling] = useState(false);

        useEffect(() => {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => setVisible(entry.isIntersecting));
            }, { threshold: 0.1 });
            if (domRef.current) observer.observe(domRef.current);
            return () => {
                if (domRef.current) observer.unobserve(domRef.current);
            }
        }, []);

        useEffect(() => {
            if (!repeatTitle) return;
            let timer;
            const handleScroll = () => {
                setIsScrolling(true);
                clearTimeout(timer);
                timer = setTimeout(() => {
                    setIsScrolling(false);
                }, 150); 
            };
            window.addEventListener('scroll', handleScroll, { passive: true });
            return () => window.removeEventListener('scroll', handleScroll);
        }, [repeatTitle]);

    const useScrollSpy = (ids, offset = window.innerHeight / 2) => {
        const [activeId, setActiveId] = useState(ids[0]);
        useEffect(() => {
            const handleScroll = () => {
                const scrollPosition = window.scrollY + offset;
                let current = ids[0];
                for (const id of ids) {
                    const element = document.getElementById(id);
                    if (element && element.offsetTop <= scrollPosition) {
                        current = id;
                    }
                }
                setActiveId(current);
            };
            window.addEventListener('scroll', handleScroll, { passive: true });
            handleScroll(); 
            return () => window.removeEventListener('scroll', handleScroll);
        }, [ids, offset]);
        return activeId;

                        setIsDark(true);
                    } else {
                        document.documentElement.classList.remove('dark');
                        setIsDark(false);

        const getItemsPerPage = (key) => key === 'sub' ? (isMd ? 4 : 2) : 1;

            const container = e.target;
            if (!container.children.length) return;
            const itemWidth = container.children[0].offsetWidth + parseInt(window.getComputedStyle(container).gap || 16);
            const itemsPerPage = getItemsPerPage(key);
            const pageWidth = itemWidth * itemsPerPage;
            const newPageIdx = Math.round(container.scrollLeft / pageWidth);
            setPageIdxs(prev => prev[key] === newPageIdx ? prev : { ...prev, [key]: newPageIdx });

        const scrollStep = (ref, direction, key) => {
            if (!ref.current || !ref.current.children.length) return;
            const container = ref.current;
            const itemWidth = container.children[0].offsetWidth + parseInt(window.getComputedStyle(container).gap || 16);
            const itemsPerPage = getItemsPerPage(key);
            const scrollAmount = itemWidth * itemsPerPage;
            container.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });

            if (!ref.current || !ref.current.children.length) return;
            const container = ref.current;

            const itemsPerPage = getItemsPerPage(key);
            const scrollAmount = itemWidth * itemsPerPage;

            } else {
                container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
        };

        ];

        return (
            <section id="history" className="w-full relative scroll-mt-0">
                <AnimatedSection mainTitle="更新歷史" subTitle="空間站日誌">
                    <div className="flex flex-col w-full relative">
                        {UPDATES.map((item, i) => (
                            <HistoryItem key={i} item={item} isLast={i === UPDATES.length - 1} />
                        ))}
                    </div>
                </AnimatedSection>
            </section>
        );
    };

    const ChatBot = () => {
        const [isOpen, setIsOpen] = useState(false);
        const [messages, setMessages] = useState([{ role: 'ai', text: '你好！我是 ClaySeek。很高興能在此為你提供有關星壤的資訊。' }]);
        const [input, setInput] = useState('');
        const [isLoading, setIsLoading] = useState(false);
        const [selectedModel, setSelectedModel] = useState('Gemini');
        const chatContainerRef = useRef(null);

        useEffect(() => { 
            if (chatContainerRef.current) chatContainerRef.current.scrollTo({ top: chatContainerRef.current.scrollHeight, behavior: 'smooth' }); 
        }, [messages, isLoading]);

        const handleSend = async () => {
            if (!input.trim() || isLoading) return;
            const userText = input.trim(); 
            setInput('');
            setMessages(prev => [...prev, { role: 'user', text: userText }]);
            setIsLoading(true);

            const apiKey = "";
            const systemPrompt = "你是Clay的AI助手，使用簡短繁體中文回覆。Clay愛好程式設計、星鐵、軌道交通。";
            
            const callAPI = async (retryCount = 0) => {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }], systemInstruction: { parts: [{ text: systemPrompt }] } })
                    });
                    if (!res.ok) throw new Error('API');
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (retryCount < 5) { 
                        await new Promise(r => setTimeout(r, Math.pow(2, retryCount) * 1000)); 
                        return callAPI(retryCount + 1); 
                    }
                    throw error;
                }
            };
            
            try {
                const response = await callAPI();
                setMessages(prev => [...prev, { role: 'ai', text: (selectedModel === '豆包' ? `[豆包] ` : ``) + (response || "訊號微弱...") }]);
            } catch (e) {
                setMessages(prev => [...prev, { role: 'ai', text: "暫時無法連接到星際伺服器，請檢查網路。" }]);
            } finally { setIsLoading(false); }
        };

        return (
            <>
                {/* 懸浮切換按鈕 (深色模式白底黑圖) */}
                <button onClick={() => setIsOpen(!isOpen)} className="fixed bottom-10 right-10 w-14 h-14 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-full shadow-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all z-[100] group border border-transparent dark:border-gray-200">
                    <div className={`transition-all duration-300 transform ${isOpen ? 'rotate-90 scale-110' : 'rotate-0'}`}>
                        {isOpen ? <Icon name="close" className="text-[28px]" /> : <div className="w-7 h-7 group-hover:animate-pulse"><SVGIcons.StarSparkle /></div>}
                    </div>
                </button>
                
                {/* 液態玻璃對話方塊 */}
                <div className={`fixed bottom-28 right-6 md:right-10 w-[calc(100vw-3rem)] sm:w-[380px] h-[550px] liquid-glass rounded-[2.5rem] shadow-2xl z-[90] flex flex-col overflow-hidden transition-all duration-500 origin-bottom-right transform ${isOpen ? 'translate-y-0 scale-100 opacity-100' : 'translate-y-12 scale-90 opacity-0 pointer-events-none'}`}>
                    <div className="p-6 pb-4 flex items-center justify-between border-b border-white/10 dark:border-[#333]">
                        <div className="flex items-center gap-3">
                            <img src="https://images.castorice.co/clay.castorice.co/images/Head.jpg" className="w-8 h-8 rounded-full border border-white/40 shadow-sm object-cover" />
                            <div className="text-black dark:text-white text-base flex items-center font-sans">
                                <span className="font-normal">Clay</span><span className="font-semibold">Seek</span>
                            </div>
                            <div className="bg-blue-600 px-2.5 h-5 rounded-full shadow-sm flex items-center justify-center min-w-[32px]">
                                <span className="text-[9px] font-bold text-white uppercase leading-none text-center block w-full">AI</span>
                            </div>
                        </div>
                        <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                    </div>
                    
                    <div ref={chatContainerRef} className="flex-1 overflow-y-auto p-5 space-y-4">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] px-4 py-2.5 rounded-[1.5rem] text-sm leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white rounded-br-sm' : 'bg-white/50 dark:bg-[#1a1a1a]/90 text-gray-900 dark:text-white backdrop-blur-sm rounded-bl-sm border border-white/30 dark:border-[#333]'}`}>{m.text}</div>
                            </div>
                        ))}
                        {isLoading && <div className="flex justify-start"><div className="bg-white/30 dark:bg-[#1a1a1a]/90 px-4 py-2 rounded-full flex gap-2 border border-white/10 dark:border-[#333]"><div className="w-1.5 h-1.5 bg-blue-600 dark:bg-blue-400 rounded-full animate-bounce"></div><div className="w-1.5 h-1.5 bg-blue-600 dark:bg-blue-400 rounded-full animate-bounce [animation-delay:0.2s]"></div><div className="w-1.5 h-1.5 bg-blue-600 dark:bg-blue-400 rounded-full animate-bounce [animation-delay:0.4s]"></div></div></div>}
                    </div>
                    
                    <div className="p-5 pt-2 space-y-3">
                        <div className="flex flex-col gap-2">
                            <div className="inline-flex self-start bg-white/30 dark:bg-[#111111]/80 backdrop-blur-md p-1 rounded-full border border-white/30 dark:border-[#333]/50 shadow-sm">
                                {['Gemini', '豆包'].map(m => (
                                    <button key={m} onClick={() => setSelectedModel(m)} className={`px-3 py-1 rounded-full text-[10px] font-bold transition-all duration-300 ${selectedModel === m ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 dark:text-white hover:text-black dark:hover:text-gray-200'}`}>{m}</button>
                                ))}
                            </div>
                            <div className="flex items-center gap-1 bg-white/40 dark:bg-[#0a0a0a]/80 backdrop-blur-md p-1.5 rounded-full border border-white/30 dark:border-[#333]/50 shadow-inner group">
                                <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSend()} placeholder={`使用 ${selectedModel} 提問...`} className="flex-1 bg-transparent border-none px-4 text-sm outline-none text-gray-800 dark:text-white placeholder-gray-500 dark:placeholder-gray-500" />
                                <button onClick={handleSend} disabled={isLoading || !input.trim()} className={`w-9 h-9 rounded-full flex items-center justify-center transition-all shadow-sm ${isLoading || !input.trim() ? 'bg-blue-100/50 dark:bg-[#1a1a1a] text-blue-400 dark:text-gray-500 cursor-not-allowed' : 'bg-blue-500 text-white hover:bg-blue-600 active:bg-blue-800'}`}>
                                    <Icon name="send" className="text-[18px]" />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </>
        );
    };

    const Footer = () => (
        <footer className="snap-section flex flex-col items-center justify-center space-y-8 w-full py-16 bg-blue-50/50 dark:bg-blue-900/20 border-t border-blue-100/50 dark:border-blue-900/50">
            <div className="flex flex-col items-center text-center">
                <h2 className="text-4xl md:text-6xl tracking-tight flex items-center cursor-default mb-4" style={{ fontFamily: '"Google Sans Flex", "Google Sans", sans-serif' }}>
                    <span className="font-normal text-gray-800 dark:text-white">Clay</span><span className="font-semibold ml-2 text-blue-600 dark:text-blue-500">SpaceStation</span>
                </h2>
                
                <div className="flex gap-4 justify-center mb-6">
                    <a href="https://www.claylark.com" target="_blank" className="px-8 py-3 bg-blue-600 text-white text-sm font-bold rounded-full shadow-lg shadow-blue-200 dark:shadow-blue-900/40 active:scale-95 transition-all flex items-center justify-center">造訪主站</a>
                    <a href="https://github.com/Claylark" target="_blank" className="w-11 h-11 bg-black dark:bg-[#222] text-white dark:text-white rounded-full flex items-center justify-center shadow-lg dark:shadow-[0_4px_15px_rgba(0,0,0,0.5)] active:scale-95 transition-all p-2.5 hover:bg-gray-800 dark:hover:bg-[#333] border dark:border-[#444]"><SVGIcons.GitHub /></a>
                </div>

                <p className="text-lg md:text-xl text-gray-500 font-bold tracking-[0.4em] pt-2">願此行，終抵群星</p>
            </div>
            
            <div className="flex flex-col items-center space-y-3 text-xs text-gray-400 font-light text-center px-6 pt-2">
                <div className="text-gray-400 dark:text-gray-500 font-mono tracking-widest text-[10px] mb-2 font-bold">Version 2.0 Alpha Build 2</div>
                <p>版權所有 © {new Date().getFullYear()} Claylark 保留所有權利</p>
                <div className="flex flex-col space-y-1.5">
                    <span>基於 <a href="https://github.com/Claylark/clay-spacestation/blob/main/License.md" target="_blank" className="hover:text-gray-600 dark:hover:text-gray-300 transition-colors cursor-pointer">Claylark 開源軟體使用授權條款 (COSL) v1.0</a></span>
                    <span className="hover:text-gray-600 dark:hover:text-gray-300 transition-colors cursor-default">ICP 備案號：不存在</span>
                    <span className="hover:text-gray-600 dark:hover:text-gray-300 transition-colors cursor-default">公安網備：不存在</span>
                </div>
            </div>
        </footer>
    );

    const App = () => (<div className="relative font-sans antialiased selection:bg-blue-100 selection:text-blue-900 dark:selection:bg-blue-900/50 dark:selection:text-blue-100 min-h-screen bg-transparent transition-colors duration-300"><Header /><Hero /><Profile /><Attributes /><Network /><History /><Footer /><ChatBot /></div>);
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
