<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        (function() {
            // 获取浏览器语言并转换为小写
            const lang = (navigator.language || navigator.userLanguage).toLowerCase();
            
            // 默认设置为简体中文
            let targetPath = '/zh-CN'; 

            // 优先检测其他特定语言设置
            if (lang.startsWith('en')) {
                targetPath = '/en-US'; // 英文
            } else if (lang.includes('tw')) {
                targetPath = '/zh-TW'; // 繁体中文（台湾）
            } else if (lang.includes('hk') || lang.includes('mo')) {
                targetPath = '/zh-HK'; // 繁体中文（香港/澳门）
            }

            // 执行跳转并替换历史记录
            window.location.replace(targetPath);
        })();
    </script>
</head>
<body style="background: #000;">
    <noscript>
        <meta http-equiv="refresh" content="0; url=/zh-CN">
    </noscript>
</body>
</html>
