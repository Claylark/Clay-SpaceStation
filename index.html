    const useScrollSpy = (ids, offset = 120) => {
        const [activeId, setActiveId] = useState(ids[0]);
        useEffect(() => {
            const handleScroll = () => {
                const scrollPosition = window.scrollY + offset;
                let current = ids[0];
                for (const id of ids) {
                    const element = document.getElementById(id);
                    if (element && element.offsetTop <= scrollPosition) current = id;
                }
                setActiveId(current);
            };
            window.addEventListener('scroll', handleScroll);
            handleScroll(); 
            return () => window.removeEventListener('scroll', handleScroll);
        }, [ids, offset]);
        return activeId;
    };

                        <a key={i} href={link.copy ? undefined : link.url} target={link.copy ? undefined : "_blank"} onClick={(e) => { if(link.copy) { e.preventDefault(); handleCopy(link.id); } }} className="flex items-center p-3 bg-white border-[2px] border-gray-100 rounded-full hover:border-blue-400 hover:shadow-[0_15px_30px_-5px_rgba(59,130,246,0.2)] transition-all duration-300 cursor-pointer group w-full sm:w-[calc(50%-1.5rem)] max-w-[500px]">
                            <div className={`w-16 h-16 md:w-[76px] md:h-[76px] rounded-full flex items-center justify-center shrink-0 ${link.bg} ${link.color} shadow-sm group-hover:scale-110 transition-transform duration-300`}><div className="w-8 h-8 md:w-9 md:h-9"><link.svgIcon /></div></div>
                            <div className="flex-1 ml-4 mr-4 md:ml-6 md:mr-6 min-w-0 flex flex-col justify-center text-left"><div className={`text-sm md:text-base font-bold tracking-wide mb-0.5 ${link.color}`}>{link.name}</div><div className="text-2xl md:text-[1.75rem] font-bold text-gray-900 truncate leading-tight">{link.id}</div></div>
                            <div className="w-16 h-16 md:w-[76px] md:h-[76px] rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-blue-500 transition-colors duration-300 shrink-0 border border-gray-100 shadow-sm group-hover:border-blue-500">{link.copy ? <Icon name="content_copy" className="text-[24px] md:text-[32px] text-gray-400 group-hover:text-white transition-colors duration-300" /> : <Icon name="arrow_forward" className="text-[24px] md:text-[32px] text-gray-400 group-hover:text-white transition-colors duration-300" />}</div>
                        </a>
                    ))}
                    <div className="w-full mt-4 p-8 md:p-12 bg-white border-[2px] border-gray-100 rounded-[2.5rem] md:rounded-[3rem] hover:border-blue-400 hover:shadow-[0_15px_30px_-5px_rgba(59,130,246,0.2)] transition-all duration-300">
                        <h3 className="text-sm md:text-base font-bold text-blue-600 uppercase tracking-widest mb-6 md:mb-8 flex items-center gap-3"><Icon name="mail" className="text-[20px] md:text-[24px]" /> 邮箱列表</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-y-4 gap-x-8 text-gray-600">
                            {EMAILS.map((email, idx) => (<a key={idx} href={`mailto:${email}`} className="text-lg md:text-xl font-bold text-gray-800 hover:text-blue-600 transition-colors flex items-center gap-3 group"><div className="w-2 h-2 rounded-full bg-blue-400 group-hover:bg-blue-600 transition-colors"></div>{email}</a>))}
                        </div>
                    </div>
                </div>
            </section>
        );
    };

    // --- 重构的 ChatBot 组件 ---
    const ChatBot = () => {
        const [isOpen, setIsOpen] = useState(false);
        const [messages, setMessages] = useState([{ role: 'ai', text: '你好！我是 ClaySeek。很高兴能在此为你提供有关星壤的信息。' }]);
        const [input, setInput] = useState('');
        const [isLoading, setIsLoading] = useState(false);
        const [selectedModel, setSelectedModel] = useState('Gemini');
        const chatContainerRef = useRef(null);

        useEffect(() => { 
            if (chatContainerRef.current) chatContainerRef.current.scrollTo({ top: chatContainerRef.current.scrollHeight, behavior: 'smooth' });
        }, [messages, isLoading]);

        const handleSend = async () => {
            if (!input.trim() || isLoading) return;
            const userText = input.trim();
            setInput('');
            setMessages(prev => [...prev, { role: 'user', text: userText }]);
            setIsLoading(true);

            const apiKey = "";
            const systemPrompt = "你是Clay的AI助手，使用简短中文回复。Clay爱好编程、星铁、轨道交通。";
            
            const callGemini = async (retryCount = 0) => {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userText }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    if (!res.ok) throw new Error('API_ERROR');
                    const result = await res.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (retryCount < 5) {
                        const delay = Math.pow(2, retryCount) * 1000;
                        await new Promise(r => setTimeout(r, delay));
                        return callGemini(retryCount + 1);
                    }
                    throw error;
                }
            };

            try {
                const response = await callGemini();
                setMessages(prev => [...prev, { role: 'ai', text: response || "信号微弱，请重试。" }]);
            } catch (e) {
                setMessages(prev => [...prev, { role: 'ai', text: "暂时无法连接到星际服务器，请稍后再试。" }]);
            } finally {
                setIsLoading(false);
            }
        };

        return (
            <>
                {/* 悬浮切换按钮 */}
                <button onClick={() => setIsOpen(!isOpen)} className="fixed bottom-10 right-10 w-14 h-14 bg-gray-900 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all z-[100] group">
                    <div className={`transition-all duration-300 transform ${isOpen ? 'rotate-90' : 'rotate-0'}`}>
                        {isOpen ? <Icon name="close" className="text-[28px]" /> : <div className="w-7 h-7 group-hover:animate-pulse"><SVGIcons.StarSparkle /></div>}
                    </div>
                </button>

                {/* 对话框 - 液态玻璃效果 */}
                <div className={`fixed bottom-28 right-6 md:right-10 w-[calc(100vw-3rem)] sm:w-[380px] h-[550px] liquid-glass rounded-[2.5rem] shadow-2xl z-[90] flex flex-col overflow-hidden transition-all duration-500 origin-bottom-right transform ${isOpen ? 'translate-y-0 scale-100 opacity-100' : 'translate-y-12 scale-90 opacity-0 pointer-events-none'}`}>
                    
                    {/* Header - 头像居左 + 文字样式调整 */}
                    <div className="p-6 pb-4 flex items-center justify-between border-b border-white/10">
                        <div className="flex items-center gap-3">
                            <img src="https://images.castorice.co/clay.castorice.co/images/Head.jpg" className="w-8 h-8 rounded-full border border-white/40 shadow-sm" />
                            <div className="text-base tracking-tight text-black">
                                <span className="font-normal">Clay</span><span className="font-semibold">Seek</span>
                            </div>
                            {/* AI 药丸居中对齐 */}
                            <div className="bg-blue-600 px-2.5 py-0.5 rounded-full shadow-sm flex items-center justify-center min-w-[32px]">
                                <span className="text-[10px] font-bold text-white uppercase tracking-wider text-center w-full">AI</span>
                            </div>
                        </div>
                        <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                    </div>

                    <div ref={chatContainerRef} className="flex-1 overflow-y-auto p-5 space-y-4">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] px-4 py-2.5 rounded-[1.5rem] text-sm leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white rounded-br-sm' : 'bg-white/50 text-gray-900 backdrop-blur-sm rounded-bl-sm border border-white/30'}`}>{m.text}</div>
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex justify-start">
                                <div className="bg-white/30 px-4 py-2 rounded-full flex items-center gap-2 border border-white/20">
                                    <div className="w-1.5 h-1.5 bg-blue-600 rounded-full animate-bounce"></div>
                                    <div className="w-1.5 h-1.5 bg-blue-600 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                    <div className="w-1.5 h-1.5 bg-blue-600 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="p-5 pt-2 space-y-3">
                        <div className="flex flex-col gap-2">
                            <div className="inline-flex self-start bg-white/30 backdrop-blur-md p-1 rounded-full border border-white/30 shadow-sm">
                                {['Gemini', '豆包'].map(m => (
                                    <button key={m} onClick={() => setSelectedModel(m)} className={`px-3 py-1 rounded-full text-[10px] font-bold transition-all duration-300 ${selectedModel === m ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:text-black'}`}>{m}</button>
                                ))}
                            </div>
                            <div className="flex items-center gap-1 bg-white/40 backdrop-blur-md p-1.5 rounded-full border border-white/30 shadow-inner group">
                                <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSend()} placeholder={`使用 ${selectedModel} 提问...`} className="flex-1 bg-transparent border-none px-4 text-sm outline-none text-gray-800 placeholder-gray-500" />
                                <button onClick={handleSend} disabled={isLoading || !input.trim()} className={`w-9 h-9 rounded-full flex items-center justify-center transition-all shadow-sm ${isLoading || !input.trim() ? 'bg-blue-100 text-blue-300 cursor-not-allowed' : 'bg-blue-400 text-white hover:bg-blue-500 active:bg-blue-800'}`}>
                                    <Icon name="send" className="text-[18px]" />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </>
        );
    };

    const Footer = () => (
        <div className="flex flex-col items-center space-y-6 w-full py-16 bg-[#f9fafb] border-t border-gray-100">
            <div className="flex gap-3 justify-center">
                <a href="https://clay.castorice.co" target="_blank" className="px-6 py-2.5 bg-blue-600 text-white text-xs font-bold rounded-full shadow-lg shadow-blue-200 active:scale-95 transition-all">访问主站</a>
                <a href="https://github.com/Claylark" target="_blank" className="w-9 h-9 bg-black text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-all p-2"><SVGIcons.GitHub /></a>
            </div>
            <div className="flex flex-col items-center space-y-1.5 text-[10px] text-gray-400 font-light text-center">
                <p>版权所有 © {new Date().getFullYear()} Claylark 保留所有权利</p>
                <span className="hover:text-gray-500 transition-colors cursor-default tracking-wide uppercase">Star Soil Space Station</span>
            </div>
        </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<div className="relative font-sans antialiased selection:bg-blue-100 selection:text-blue-900 min-h-screen"><Header /><Hero /><Profile /><Attributes /><Network /><Footer /><ChatBot /></div>);
  </script>
</body>
</html>
